{% extends "master.html" %}
{% load static %}

{% block title %}
Your flashcards
{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'flashcards.css' %}">

<h1 class="dashboard-title">Your Flashcards</h1>

<div class="dashboard-grid">
    {% for x in flashcards %}
    <a href="#" class="dashboard-card">
        <h2>{{ x.title }}</h2>
        <p>{{ x.description }}</p>
    </a>
    {% empty %}
    <div style="text-align:center; grid-column: 1 / -1; color: #555;">
        <p>You haven't added any flashcards yet.</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
